                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // 4.4. MasterEditorModal
    const MasterEditorModal = ({ config, defaultConfig, onSave, onClose }) => {
        const [localConfig, setLocalConfig] = useState(deepClone(config));
        const [activeTab, setActiveTab] = useState('future');
        const [inputMode, setInputMode] = useState('incremental');
        const [futureSubTab, setFutureSubTab] = useState('type4');
        const [futureDataType, setFutureDataType] = useState('table');
        const fileInputRef = useRef(null);

        const handleSave = () => { onSave(localConfig); onClose(); };
        
        const handleExportCsv = () => {
            let dataToExport = [], fileName = "";
            let headersDef = T2_CSV_HEADERS; 

            if (activeTab === 'coefSettings' || (activeTab === 'future' && futureDataType === 'coef')) {
                const settings = (activeTab === 'future') ? localConfig.coefSettingsFuture : localConfig.coefSettings;
                fileName = (activeTab === 'future') ? "支給率係数_改定案.csv" : "支給率係数_現行.csv";
                
                const years = settings.type1.map(r => r.years);
                dataToExport = years.map((y, i) => ({
                    [COEF_CSV_HEADERS.labels[0]]: y,
                    [COEF_CSV_HEADERS.labels[1]]: settings.type1[i]?.coef || 0,
                    [COEF_CSV_HEADERS.labels[2]]: settings.type2[i]?.coef || 0,
                    [COEF_CSV_HEADERS.labels[3]]: settings.type3[i]?.coef || 0,
                    [COEF_CSV_HEADERS.labels[4]]: settings.type4[i]?.coef || 0,
                }));
            } else {
                let rawData = [];
                if (activeTab === 'future') { 
                    rawData = localConfig.masterDataFuture[futureSubTab]; 
                    fileName = `新制度ポイント表_改定案_${futureSubTab}.csv`; 
                    headersDef = T2_CSV_HEADERS;
                } else if (activeTab === 'masterData2') { 
                    rawData = localConfig.masterData2; 
                    fileName = "現行新制度ポイント表.csv"; 
                    headersDef = T2_CSV_HEADERS;
                } else { 
                    rawData = localConfig[activeTab]; 
                    fileName = `現行旧制度ポイント表_${activeTab}.csv`; 
                    headersDef = T1_CSV_HEADERS; 
                }
                dataToExport = rawData.map(row => { 
                    const newRow = {}; 
                    headersDef.keys.forEach((key, idx) => { newRow[headersDef.labels[idx]] = row[key]; }); 
                    return newRow; 
                });
            }
            const csv = Papa.unparse(dataToExport);
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        const handleImportClick = () => { fileInputRef.current?.click(); };

        const handleFileChange = (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                Papa.parse(text, {
                    header: true, skipEmptyLines: true, dynamicTyping: true,
                    complete: (results) => {
                        const data = results.data;
                        if (!data || data.length === 0) { alert('データなし'); return; }
                        processImportedData(data);
                    },
                    error: (err) => alert('CSV読込エラー: ' + err.message)
                });
            };
            reader.readAsText(file);
            e.target.value = '';
        };

        const handlePasteClick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) { alert("クリップボードが空です"); return; }
                Papa.parse(text, {
                    header: true, skipEmptyLines: true, dynamicTyping: true,
                    complete: (results) => {
                        const data = results.data;
                        if (!data || data.length === 0) { alert('データ解析不可'); return; }
                        processImportedData(data);
                    }
                });
            } catch (err) { alert("貼付エラー: " + err.message); }
        };

        const processImportedData = (rows) => {
            try {
                const getVal = (row, key) => {
                    const k = Object.keys(row).find(k => k.includes(key));
                    return k ? row[k] : 0;
                };
                
                if (activeTab === 'coefSettings' || (activeTab === 'future' && futureDataType === 'coef')) {
                    const newCoefs = { type1: [], type2: [], type3: [], type4: [] };
                    rows.forEach(row => {
                        const y = row['年数'] || row['Year'] || row['y'];
                        if (y) {
                            newCoefs.type1.push({ years: y, coef: getVal(row, 'T1') || 0 });
                            newCoefs.type2.push({ years: y, coef: getVal(row, 'T2') || 0 });
                            newCoefs.type3.push({ years: y, coef: getVal(row, 'T3') || 0 });
                            newCoefs.type4.push({ years: y, coef: getVal(row, 'T4') || 0 });
                        }
                    });
                    if (activeTab === 'future') setLocalConfig(prev => ({ ...prev, coefSettingsFuture: newCoefs }));
                    else setLocalConfig(prev => ({ ...prev, coefSettings: newCoefs }));
                } else {
                    const isT1 = ['masterData1_1', 'masterData1_2', 'masterData1_3'].includes(activeTab);
                    const mappedData = rows.map(row => {
                        const y = row['年数'] || row['Year'] || row['y'];
                        if (!y) return null;
                        const newRow = { y };
                        if (isT1) {
                            newRow.los1 = getVal(row, '勤続') || 0;
                            newRow.r1_1 = getVal(row, '係員') || 0;
                            newRow.r2 = getVal(row, '主任') || 0;
                            newRow.r3 = getVal(row, '係長') || 0;
                            newRow.r4 = getVal(row, '課長') || 0;
                            newRow.r5 = getVal(row, '次長') || 0;
                            newRow.r6 = getVal(row, '部長') || 0;
                        } else {
                            newRow.los = getVal(row, '勤続') || 0;
                            newRow.r1 = getVal(row, '係員') || 0;
                            newRow.r2 = getVal(row, '主任') || 0;
                            newRow.r3 = getVal(row, '係長') || 0;
                            newRow.r4 = getVal(row, '課長') || 0;
                            newRow.r5 = getVal(row, '次長') || 0;
                            newRow.r6 = getVal(row, '部長') || 0;
                        }
                        return newRow;
                    }).filter(r => r);
                    
                    if (activeTab === 'future') {
                        setLocalConfig(prev => ({
                            ...prev,
                            masterDataFuture: { ...prev.masterDataFuture, [futureSubTab]: mappedData }
                        }));
                    } else if (activeTab === 'masterData2') {
                        setLocalConfig(prev => ({ ...prev, masterData2: mappedData }));
                    } else {
                        setLocalConfig(prev => ({ ...prev, [activeTab]: mappedData }));
                    }
                }
                alert(`データを読み込みました (${rows.length}行)`);
            } catch (e) { alert('取込処理エラー: ' + e.message); }
        };

        const renderTable = (key, data, isT1) => {
            const handleBlur = (idx, field, valStr) => {
                const val = parseFloat(valStr);
                if (isNaN(val)) return;
                const newData = [...data];
                if (inputMode === 'cumulative') {
                    newData[idx] = { ...newData[idx], [field]: val };
                } else {
                    const prevVal = idx > 0 ? newData[idx - 1][field] : 0;
                    const inc = newData[idx][field] - prevVal;
                    const diff = val - inc;
                    if (diff === 0) return;
                    for (let i = idx; i < newData.length; i++) {
                        newData[i] = { ...newData[i], [field]: Math.round((newData[i][field] + diff)*100)/100 };
                    }
                }
                
                if (activeTab === 'future') {
                    setLocalConfig(prev => ({ ...prev, masterDataFuture: { ...prev.masterDataFuture, [futureSubTab]: newData } }));
                } else {
                    setLocalConfig(prev => ({ ...prev, [key]: newData }));
                }
            };

            const renderCell = (row, field, i) => {
                const val = row[field];
                const prev = i > 0 ? data[i-1][field] : 0;
                const display = inputMode === 'incremental' ? Math.round((val - prev)*100)/100 : val;
                return (
                    <td className="p-1 border border-slate-200">
                        <input type="number" step="0.1" defaultValue={display} onBlur={e => handleBlur(i, field, e.target.value)} className="w-full text-right p-1 bg-transparent outline-none focus:bg-indigo-50" />
                    </td>
                );
            };

            return (
                <div className="flex-1 overflow-auto border rounded-lg h-[500px]">
                    <table className="w-full text-sm text-right border-collapse relative">
                        <thead className="bg-slate-100 text-slate-700 font-bold sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th className="p-3 w-16 text-center border-b">年数</th>
                                <th className="p-3 border-b">{isT1?'T1勤続':'勤続P'}</th>
                                <th className="p-3 border-b">{isT1?'T1係員':'係員'}</th>
                                <th className="p-3 border-b">主任</th>
                                <th className="p-3 border-b">係長</th>
                                <th className="p-3 border-b">課長</th>
                                <th className="p-3 border-b">次長</th>
                                <th className="p-3 border-b">部長</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {data.map((row, i) => (
                                <tr key={row.y} className="hover:bg-slate-50">
                                    <td className="p-2 text-center font-bold text-slate-500 bg-slate-50">{row.y}</td>
                                    {renderCell(row, isT1?'los1':'los', i)}
                                    {renderCell(row, isT1?'r1_1':'r1', i)}
                                    {renderCell(row, 'r2', i)}
                                    {renderCell(row, 'r3', i)}
                                    {renderCell(row, 'r4', i)}
                                    {renderCell(row, 'r5', i)}
                                    {renderCell(row, 'r6', i)}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const renderContent = () => {
            if (activeTab === 'coefSettings' || (activeTab === 'future' && futureDataType === 'coef')) {
                const settings = activeTab === 'future' ? localConfig.coefSettingsFuture : localConfig.coefSettings;
                return (
                    <div className="flex-1 overflow-auto border rounded-lg h-[500px]">
                        <table className="w-full text-sm text-right border-collapse relative">
                            <thead className="bg-slate-100 sticky top-0 z-10"><tr><th className="p-3">年数</th><th className="p-3">旧①</th><th className="p-3">旧②</th><th className="p-3">旧③</th><th className="p-3">新</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                                {settings.type1.map((r, i) => (
                                    <tr key={r.years} className="hover:bg-slate-50">
                                        <td className="p-2 text-center bg-slate-50">{r.years}</td>
                                        {['type1','type2','type3','type4'].map(t => (
                                            <td key={t} className="p-1 border border-slate-200">
                                                <input type="number" step="0.01" defaultValue={settings[t][i]?.coef} 
                                                    onBlur={e => {
                                                        const val = parseFloat(e.target.value);
                                                        if (!isNaN(val)) {
                                                            const newSet = {...settings};
                                                            newSet[t][i].coef = val;
                                                            if (activeTab === 'future') setLocalConfig(prev => ({ ...prev, coefSettingsFuture: newSet }));
                                                            else setLocalConfig(prev => ({ ...prev, coefSettings: newSet }));
                                                        }
                                                    }} className="w-full text-right p-1 outline-none focus:bg-indigo-50"/>
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            }
            if (activeTab === 'future' && futureDataType === 'params') {

        const handleCalculateAndExport = async (format) => {
            if (!data.length) return;
            setStatus('計算開始...'); setError(null); setProgress(0); setIsCalculating(true);
            
            const now = new Date();
            const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
            const filename = `退職金シミュレーション比較_${timestamp}.${format}`;

            const processInTimeSlices = async () => {

                    setProgress(Math.round((index / data.length) * 100));
                    setStatus(`計算中... ${index} / ${data.length}`);
                    await new Promise(r => setTimeout(r, 0));

                return results;

                    resA.yearlyDetails.forEach(d => { if (costsMap.has(d.year)) costsMap.get(d.year).A[typeKey] += d.amountInc; });
                    resB.yearlyDetails.forEach(d => { if (costsMap.has(d.year)) costsMap.get(d.year).B[typeKey] += d.amountInc; });

                A: { type1: val.A.t1, type2: val.A.t2, type3: val.A.t3, type4: val.A.t4, total: val.A.t1 + val.A.t2 + val.A.t3 + val.A.t4 },

        // --- Search Logic ---
        const executeSearch = () => {
            setSelectedEmployeeId(null);
            setSearchError(null);
            const term = searchTerm.trim();
            if (!term) return;
            if (data.length === 0) { setSearchError('データがありません。'); return; }
            
            const found = data.find(row => {
                const idVal = COL_ALIASES.id.reduce((f, a) => f || row[a], undefined);
                if (String(idVal) === term) return true;
                const nameVal = COL_ALIASES.name.reduce((f, a) => f || row[a], undefined);
                if (nameVal && String(nameVal).includes(term)) return true;
                return false;
            });
            
            if (found) {
                const id = String(COL_ALIASES.id.reduce((f, a) => f || found[a], undefined));
                setSelectedEmployeeId(id);
            } else {
                setSearchError('該当なし');
            }
        };
        
        const searchResultData = useMemo(() => {
            if (!selectedEmployeeId || data.length === 0) return null;
            const found = data.find(row => String(COL_ALIASES.id.reduce((f, a) => f || row[a], undefined)) === selectedEmployeeId);
            if (!found) return null;
            
            const resB = runCalculation(found, configB);
            const targetAmount = (configA.adjustmentConfig?.enabled || configA.unifyNewSystemConfig?.enabled) && resB ? resB.retirementAllowance : undefined;
            const targetReserve = (configA.adjustmentConfig?.enabled || configA.unifyNewSystemConfig?.enabled) && resB ? resB.reserve2026 : undefined;
            const resA = runCalculation(found, configA, targetAmount, targetReserve);
            
            if (resA && resB) return { resA, resB };
            return null;
        }, [selectedEmployeeId, data, configA, configB, runCalculation]);

        // --- Analysis Logic ---
        const analysisResult = useMemo(() => {
            if (data.length === 0) return null;
            
            const d1999 = new Date(1999, 2, 31);
            const d2000 = new Date(2000, 2, 31);
            const d2011 = new Date(2011, 8, 30);
            
            let refDate = new Date();
            refDate.setHours(0,0,0,0);
            let isTransitionDate = false;

            if (configA.transitionConfig.enabled && configA.transitionConfig.date) {
                refDate = new Date(configA.transitionConfig.date);
                isTransitionDate = true;
            } else if (configB.transitionConfig.enabled && configB.transitionConfig.date) {
                refDate = new Date(configB.transitionConfig.date);
                isTransitionDate = true;
            }

            const groups = { type1: [], type2: [], type3: [], type4: [] };

            data.forEach(row => {
                const jd = parseDate(row['入社日'] || row['joinDate']);
                if (!jd) return;
                const bd = parseDate(row['生年月日'] || row['birthDate']);
                const item = { ...row, _joinDate: jd, _birthDate: bd };
                
                if (jd <= d1999) groups.type1.push(item);
                else if (jd <= d2000) groups.type2.push(item);
                else if (jd <= d2011) groups.type3.push(item);
                else groups.type4.push(item);
            });

            const getCoef = (d, years) => {
                let table = [];
                if (d <= d1999) table = configB.coefSettings.type1;
                else if (d <= d2000) table = configB.coefSettings.type2;
                else if (d <= d2011) table = configB.coefSettings.type3;
                else table = configB.coefSettings.type4;
                if (!table || table.length === 0) return 1.0;
                const y = Math.max(1, Math.floor(years));
                const r = table.find(x => x.years === y) || table[table.length - 1];
                return r ? r.coef : 1.0;
            };

            const processGroup = (list) => {
                if (list.length === 0) return null;
                list.sort((a, b) => a._joinDate.getTime() - b._joinDate.getTime());
                
                const oldest = list[0];
                const newest = list[list.length - 1]; 

                const calcYears = (d) => calculatePeriodYears(d, refDate, 'floor');
                const calcAge = (birth) => {
                    if(!birth) return null;
                    return Math.floor(calculatePeriodYears(birth, refDate, 'floor'));
                }
                
                const oldestYears = calcYears(oldest._joinDate);
                const newestYears = calcYears(newest._joinDate);

                return {
                    count: list.length,
                    oldest: {
                        name: oldest['氏名'] || oldest['name'] || '不明',
                        id: oldest['社員番号'] || oldest['employeeId'] || '不明',
                        date: oldest._joinDate,
                        years: oldestYears,
                        age: calcAge(oldest._birthDate),
                        coef: getCoef(oldest._joinDate, oldestYears)
                    },
                    newest: {
                        name: newest['氏名'] || newest['name'] || '不明',
                        id: newest['社員番号'] || newest['employeeId'] || '不明',
                        date: newest._joinDate,
                        years: newestYears,
                        age: calcAge(newest._birthDate),
                        coef: getCoef(newest._joinDate, newestYears)
                    }
                };
            };

            return {
                type1: processGroup(groups.type1),
                type2: processGroup(groups.type2),
                type3: processGroup(groups.type3),
                type4: processGroup(groups.type4),
                total: data.length,
                refDateStr: formatDateWithWareki(refDate),
                isTransitionDate
            };
        }, [data, configA.transitionConfig, configB.transitionConfig]);

                            </div>

                            <div className="flex justify-between items-center mb-1"><span className="text-[10px] text-slate-400 font-bold uppercase">Newest (最若手)</span><span className="text-[10px] font-mono text-slate-400">{formatDateWithWareki(groupData.newest.date).split(' ')[0]}入社</span></div>
                            <div className="flex flex-col">

                            </div>
                        </div>
                    </div>
                </div>

                                        {renderAnalysisCard(<div>旧制度区分②<div className="text-[11px] font-normal text-slate-500 mt-0.5">1999.4～2000.3 (H11.4～H12.3)</div></div>, analysisResult.type2, "text-yellow-600")}
                                        {renderAnalysisCard(<div>旧制度区分③<div className="text-[11px] font-normal text-slate-500 mt-0.5">2000.4～2011.9 (H12.4～H23.9)</div></div>, analysisResult.type3, "text-emerald-600")}
                                        {renderAnalysisCard(<div>新制度<div className="text-[11px] font-normal text-slate-500 mt-0.5">2011.10～ (H23.10～)</div></div>, analysisResult.type4, "text-blue-500")}
                                    </div>
                                    <div className="mt-4 text-xs text-slate-400 text-right">※ 勤続年数・年齢は <span className="font-bold">{analysisResult.refDateStr.split(' ')[0]} {analysisResult.isTransitionDate ? '(制度改定日)' : ''}</span> 時点での概算です</div>
                                </div>
                            </div>
                        )}
                        <div className="border-t border-slate-200 pt-8">
                            <AnnualCostChart data={aggregatedData} />
                        </div>
                        
                        <div className="border-t border-slate-200 pt-8 print-break-inside-avoid">
                            <h3 className="font-bold text-slate-700 flex items-center gap-3 mb-6 text-lg"><Search className="w-6 h-6 text-indigo-600" /> 個人別シミュレーション比較</h3>
                            <div className="flex gap-3 max-w-xl mb-6 no-print">
                                <input type="text" placeholder="社員番号 または 氏名..." className="flex-1 border-slate-300 rounded-xl px-5 py-3 text-base focus:ring-2 focus:ring-indigo-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && executeSearch()}/>
                                <button onClick={executeSearch} className="bg-indigo-600 text-white px-6 py-3 rounded-xl text-base font-bold hover:bg-indigo-700 transition">検索</button>
                            </div>
                            {searchError && <div className="text-red-500 text-base bg-red-50 p-4 rounded border border-red-100"><AlertCircle className="w-5 h-5 inline mr-2"/>{searchError}</div>}
                            {searchResultData && <ResultCard resA={searchResultData.resA} resB={searchResultData.resB} configA={configA} configB={configB} onClose={() => setSelectedEmployeeId(null)} />}
                        </div>

                        <AIAnalysisReport data={aggregatedData} configA={configA} configB={configB} onApplyProposal={setConfigA} />
                    </div>
                    {editingPattern && <MasterEditorModal config={editingPattern === 'A' ? configA : configB} defaultConfig={configB} onSave={(newC) => editingPattern === 'A' ? setConfigA(newC) : setConfigB(newC)} onClose={() => setEditingPattern(null)} />}
                    {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
                </div>
            </div>
        );
    };

    // --- 5. RENDER ---
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
    
    })(); // End Scope
    </script>
</body>
</html>
